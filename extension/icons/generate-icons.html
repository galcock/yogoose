
<!DOCTYPE html>
<html>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.15;
  ctx.fillStyle = '#7c5cfc';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold ' + (size * 0.6) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Y', size/2, size/2 + size*0.03);
  
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = c.toDataURL();
  link.textContent = 'Download icon' + size + '.png';
  document.body.appendChild(link);
  document.body.appendChild(document.createElement('br'));
}
draw('c16', 16);
draw('c48', 48);
draw('c128', 128);
</script>
</body>
</html>
