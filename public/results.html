<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yogoose</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>
  <div class="results-page">
    <header class="results-header">
      <a href="/" class="results-logo">
        <span class="logo-yo">Yo</span><span class="logo-go">Go</span><span class="logo-ose">ose</span>
      </a>
      <div class="results-search-container" id="resultsSearchContainer">
        <input
          type="text"
          class="results-search-bar"
          id="resultsInput"
          placeholder="Search or ask..."
          autocomplete="off"
        >
        <div class="autocomplete" id="resultsAutocomplete"></div>
      </div>
    </header>

    <div id="responseArea">
      <div class="loading" id="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>

    <div class="related-sites" id="relatedSites" style="display:none;"></div>

    <div class="powered-by" id="poweredBy" style="display:none;">
      Powered by Yogoose AI
    </div>

    <div class="followup-bar" id="followupBar" style="display:none;">
      <input
        type="text"
        class="followup-input"
        id="followupInput"
        placeholder="Ask a follow-up..."
        autocomplete="off"
      >
      <button class="followup-send" id="followupSend">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <script src="/js/results.js"></script>
</body>
</html>
