<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yogoose</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <div class="results-page">
    <header class="results-header">
      <a href="/" class="results-logo">
        <span class="logo-yo">Yo</span><span class="logo-go">Go</span><span class="logo-ose">ose</span>
      </a>
      <div class="results-search-container" id="resultsSearchContainer">
        <input
          type="text"
          class="results-search-bar"
          id="resultsInput"
          placeholder="Search or ask..."
          autocomplete="off"
        >
        <div class="autocomplete" id="resultsAutocomplete"></div>
      </div>
    </header>

    <div id="responseArea">
      <div class="loading" id="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>

    <div class="powered-by" id="poweredBy" style="display:none;">
      Powered by Yogoose AI
    </div>
  </div>

  <script src="/js/results.js"></script>
</body>
</html>
