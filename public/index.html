<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yogoose — Search Smarter</title>
  <meta name="description" content="Yogoose knows what you want. Instantly navigate to websites or get AI answers. The search engine that replaces your URL bar.">
  <link rel="preconnect" href="/">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>
  <main class="home">
    <div class="goose-mascot" aria-hidden="true">
      <svg width="80" height="80" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="60" cy="78" rx="28" ry="22" fill="white"/>
        <!-- Neck -->
        <path d="M52 62 C48 40, 38 28, 42 18" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
        <!-- Head -->
        <circle cx="40" cy="16" r="12" fill="white"/>
        <!-- Eye -->
        <circle cx="36" cy="14" r="2.5" fill="#1a1a1a"/>
        <!-- Beak -->
        <path d="M28 18 L18 16 L28 22 Z" fill="#f59e0b"/>
        <!-- Wing -->
        <path d="M68 68 C78 58, 88 62, 85 75 C82 85, 72 82, 68 78" fill="#e8eaed"/>
        <!-- Feet -->
        <path d="M50 98 L42 108 M50 98 L50 108 M50 98 L58 108" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
        <path d="M70 98 L62 108 M70 98 L70 108 M70 98 L78 108" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
        <!-- Cheeky expression - slight smirk -->
        <path d="M32 20 Q28 22, 30 24" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo" aria-label="Yogoose">
      <span class="logo-yo">Yo</span><span class="logo-go">Go</span><span class="logo-ose">ose</span>
    </div>

    <div class="search-container" id="searchContainer">
      <input
        type="text"
        class="search-bar"
        id="searchInput"
        placeholder="Search the web or ask anything..."
        autocomplete="off"
        autofocus
      >
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <div class="autocomplete" id="autocomplete"></div>
    </div>

    <div class="ambient-ticker" id="ambientTicker" aria-hidden="true"></div>

    <div class="trending-section" id="trendingSection">
      <div class="trending-chips" id="trendingChips"></div>
    </div>

    <div class="cta-section">
      <p class="cta-text">
        Stop switching between Google and ChatGPT.<br>
        Yogoose knows if you want a website or an AI answer — instantly.
      </p>
      <a href="/extension" class="cta-button" id="ctaButton">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Use YoGoose in Your URL Bar
      </a>
    </div>
  </main>

  <footer class="footer">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
  </footer>

  <script src="/js/search.js"></script>
  <script>
    // Trending searches — instant, no API call
    {
      const chips = document.getElementById('trendingChips');
      const trending = [
        { text: 'news', icon: '📰' },
        { text: 'weather', icon: '☀️' },
        { text: 'markets', icon: '📈' },
        { text: 'lakers score', icon: '🏀' },
        { text: 'what is AI', icon: '✨' },
        { text: 'best movies 2026', icon: '🎬' },
      ];
      if (chips) {
        chips.innerHTML = trending.map(t =>
          `<a href="/results.html?q=${encodeURIComponent(t.text)}" class="trending-chip">
            <span class="trending-chip-icon">${t.icon}</span>${t.text}
          </a>`
        ).join('');
      }
    }
  </script>
  <script>
    // Ambient ticker — show instant placeholders, then swap in live data
    {
      const ticker = document.getElementById('ambientTicker');
      if (ticker) {
        // Instant static tidbits while API loads
        const placeholders = [
          'Type anything — Yogoose knows if you want a site or an answer',
          'Try typing "youtube" or "what is AI"',
          'Yogoose replaces Google AND ChatGPT',
        ];

        let items = [...placeholders];
        let current = 0;
        let interval;

        function startTicker() {
          ticker.textContent = items[current];
          ticker.style.opacity = '0.5';
          interval = setInterval(() => {
            ticker.style.opacity = '0';
            setTimeout(() => {
              current = (current + 1) % items.length;
              ticker.textContent = items[current];
              ticker.style.opacity = '0.5';
            }, 800);
          }, 4000);
        }

        // Show placeholders immediately
        startTicker();

        // Fetch real tidbits in background — when they arrive, replace placeholders
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        fetch(`/api/ambient?tz=${encodeURIComponent(tz)}`)
          .then(r => r.json())
          .then(liveItems => {
            if (liveItems && liveItems.length > 0) {
              items = liveItems;
              current = 0;
              clearInterval(interval);
              // Fade out current, start with live items
              ticker.style.opacity = '0';
              setTimeout(() => {
                startTicker();
              }, 800);
            }
          })
          .catch(() => {});
      }
    }
  </script>
</body>
</html>
